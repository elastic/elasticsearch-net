name: 'Refdoc Cleanup'

on:
  workflow_dispatch:

jobs:
  cleanup:
    name: 'Cleanup'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: write
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v4'
        with:
          ref: 'refdoc'

      - name: 'Remove large unnecessary files'
        run: |-
          find . -name 'xrefmap.yml' -delete
          find . -name 'manifest.json' -delete
          find . -name 'index.json' -delete
          find . -name '*.map' -delete
          touch .nojekyll

      - name: 'Commit'
        run: |-
          git config --global user.name '${{ github.actor }}'
          git config --global user.email '${{ github.actor }}@users.noreply.github.com'
          git add -A
          git diff --cached --quiet || git commit -m "Remove large unnecessary files from refdoc"
          git push
